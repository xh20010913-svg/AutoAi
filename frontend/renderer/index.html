<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' http://127.0.0.1:18765 ws://127.0.0.1:18765; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'">
  <title>AutoAI</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <!-- Sidebar -->
    <nav id="sidebar">
      <div class="sidebar-header">
        <h1 class="logo">AutoAI</h1>
      </div>
      <ul class="nav-list">
        <li class="nav-item active" data-page="board">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
          <span data-i18n="sidebar.board">Board</span>
        </li>
        <li class="nav-item" data-page="agents">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          <span data-i18n="sidebar.agents">Agents</span>
        </li>
        <li class="nav-item" data-page="sessions">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
          <span data-i18n="sidebar.sessions">Sessions</span>
        </li>
        <li class="nav-item" data-page="help">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
          <span data-i18n="sidebar.help">Help</span>
        </li>
        <li class="nav-item" data-page="settings">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
          <span data-i18n="sidebar.settings">Settings</span>
        </li>
      </ul>
      <div class="sidebar-footer">
        <div id="run-status" class="run-status idle">
          <span class="status-dot"></span>
          <span class="status-text">Idle</span>
        </div>
      </div>
    </nav>

    <!-- Main content -->
    <main id="main">
      <!-- Top bar -->
      <header id="topbar">
        <div id="project-info">
          <span id="project-name" class="project-name">No project</span>
          <span id="feature-progress" class="feature-progress"></span>
        </div>
        <div id="run-controls">
          <button id="btn-run" class="btn btn-primary" onclick="handleRun()" data-i18n="topbar.run">Run</button>
          <button id="btn-stop" class="btn btn-danger" onclick="handleStop()" style="display:none" data-i18n="topbar.stop">Stop</button>
        </div>
      </header>

      <!-- Page content -->
      <div id="page-content">
        <!-- Pages loaded dynamically -->
      </div>
    </main>

    <!-- Task detail panel -->
    <div id="task-detail-panel" class="panel hidden">
      <div class="panel-header">
        <h3 data-i18n="task.detailTitle">Task Detail</h3>
        <button class="btn-close" onclick="closeTaskDetail()">&times;</button>
      </div>
      <div id="task-detail-content"></div>
    </div>

    <!-- Init modal -->
    <div id="init-modal" class="modal hidden">
      <div class="modal-content">
        <h2 data-i18n="init.title">Initialize Project</h2>
        <form id="init-form" onsubmit="handleInit(event)">
          <div class="form-group">
            <label data-i18n="init.projectDir">Project Directory</label>
            <input type="text" id="init-project-dir" required placeholder="C:/projects/my-project">
          </div>
          <div class="form-group">
            <label data-i18n="init.goal">Goal</label>
            <textarea id="init-goal" required data-i18n-placeholder="init.goalPlaceholder" placeholder="Describe what you want to build..."></textarea>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label data-i18n="init.featureCount">Feature Count</label>
              <input type="number" id="init-feature-count" value="50" min="1">
            </div>
            <div class="form-group">
              <label data-i18n="init.agentCommand">Agent Command</label>
              <input type="text" id="init-agent-command" value="claude -p" placeholder="claude -p">
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label data-i18n="init.permissionMode">Permission Mode</label>
              <select id="init-permission-mode">
                <option value="default" data-i18n="init.permissionDefault">Default</option>
                <option value="acceptEdits" data-i18n="init.permissionAcceptEdits">Accept Edits</option>
                <option value="auto" data-i18n="init.permissionAuto">Auto</option>
                <option value="bypassPermissions" data-i18n="init.permissionBypass">Bypass Permissions</option>
              </select>
            </div>
            <div class="form-group">
              <label data-i18n="init.collaborationMode">Collaboration Mode</label>
              <select id="init-collaboration-mode">
                <option value="single" data-i18n="init.collabSingle">Single Agent</option>
                <option value="subagents" data-i18n="init.collabSubagents">Subagents</option>
                <option value="agent-team" data-i18n="init.collabTeam">Agent Team</option>
              </select>
            </div>
          </div>
          <div class="form-actions">
            <button type="button" class="btn" onclick="closeInitModal()" data-i18n="init.cancel">Cancel</button>
            <button type="submit" class="btn btn-primary" data-i18n="init.initialize">Initialize</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script src="api.js"></script>
  <script src="i18n.js"></script>
  <script src="app.js"></script>
</body>
</html>
